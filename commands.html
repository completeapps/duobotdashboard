<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duo Bot Dashboard – Commands</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="commands">
  <header class="top-bar">
    <a href="index.html" class="top-bar-left">
      <span class="logo-mark"></span>
      <span class="site-title">Duo Bot Dashboard</span>
    </a>
    <button class="menu-toggle" id="menuToggle" aria-label="Open navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <nav class="side-nav" id="sideNav">
    <div class="side-nav-inner">
      <div class="side-nav-header">
        <span class="side-nav-title">Navigation</span>
        <button class="side-nav-close" id="sideNavClose" aria-label="Close navigation">×</button>
      </div>
      <ul class="side-nav-links">
        <li><a href="index.html" data-nav="home">Home</a></li>
        <li class="nav-group">
          <button class="nav-group-toggle" type="button">
            <span>Groups</span>
            <span class="nav-group-caret">▾</span>
          </button>
          <ul class="nav-group-menu">
            <li><a href="groups.html" data-nav="groups">All Groups</a></li>
            <li><a href="tsc.html" data-nav="tsc">TSC</a></li>
          </ul>
        </li>
        <li><a href="changelog.html" data-nav="changelog">Changelog</a></li>
        <li><a href="commands.html" data-nav="commands">Commands</a></li>
      </ul>
    </div>
  </nav>
  <div class="side-nav-backdrop" id="sideNavBackdrop"></div>

  <main class="page">
    <section class="hero">
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-subtitle" id="heroSubtitle"></p>
    </section>

    <!-- Filters + admin toggle -->
    <section class="commands-controls">
      <div class="command-filters" id="commandFilters">
        <button class="command-filter active" data-filter="all">All</button>
        <button class="command-filter" data-filter="info">Info / Utility</button>
        <button class="command-filter" data-filter="fun">Fun / Social</button>
        <button class="command-filter" data-filter="movement">Movement</button>
        <button class="command-filter" data-filter="admin">Admin</button>
      </div>
      <div class="command-admin">
        <span id="adminStatus" class="admin-status-badge">Admin view: Locked</span>
        <button id="adminUnlockBtn" class="admin-unlock-btn">Enter admin password</button>
      </div>
    </section>

    <!-- Commands table -->
    <section class="commands-table-wrapper">
      <div class="commands-table-header">
        <div>Command</div>
        <div>Description</div>
        <div>Category</div>
        <div>Status</div>
      </div>
      <div class="commands-table-body" id="commandsTableBody">
        <!-- Rows injected -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>© 2026 Complete. All rights reserved.</span>
  </footer>

  <script src="script.js"></script>
  <script src="content-commands.js"></script>
</body>
</html>
